<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>省錢花園</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0a0e1a;--surface:#131929;--surface2:#1c2538;--surface3:#222d40;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.15);
  --mint:#34d399;--red:#f87171;--amber:#fbbf24;
  --text:#f1f5f9;--muted:#475569;--subtle:#94a3b8;
  --font:'Nunito',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}
.container{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;position:relative;}

#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;z-index:100;}
.login-logo{font-size:72px;margin-bottom:16px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.login-title{font-size:28px;font-weight:900;margin-bottom:6px;text-align:center;}
.login-sub{font-size:14px;color:var(--subtle);margin-bottom:36px;text-align:center;line-height:1.6;}
.login-card{background:var(--surface);border-radius:20px;padding:24px;width:100%;max-width:360px;border:0.5px solid var(--border2);}
.login-label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:block;}
.login-input{width:100%;background:var(--surface2);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;font-family:var(--font);font-size:16px;font-weight:700;color:var(--text);outline:none;transition:border .2s;margin-bottom:14px;}
.login-input:focus{border-color:var(--purple);}
.login-btn{width:100%;background:var(--purple);border:none;border-radius:14px;padding:15px;font-family:var(--font);font-size:15px;font-weight:800;color:#fff;cursor:pointer;transition:opacity .2s;}
.login-btn:active{opacity:.85;}
.login-msg{font-size:12px;text-align:center;margin-top:10px;min-height:16px;color:var(--red);}
.login-hint{font-size:11px;color:var(--muted);text-align:center;margin-top:10px;}

#app{display:none;flex:1;flex-direction:column;height:100dvh;}
#app.active{display:flex;}
.screen{flex:1;overflow-y:auto;padding-bottom:76px;display:none;}
.screen.active{display:block;}
.screen::-webkit-scrollbar{display:none;}

#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:0.5px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;gap:3px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:var(--font);font-size:10px;font-weight:700;transition:color .2s;}
.nav-item.active{color:var(--purple);}
.nav-icon{font-size:20px;line-height:1;}

.screen-header{padding:20px 20px 12px;display:flex;align-items:center;justify-content:space-between;}
.screen-title{font-size:24px;font-weight:900;}
.month-nav{display:flex;align-items:center;gap:8px;}
.month-nav button{background:var(--surface2);border:0.5px solid var(--border);color:var(--subtle);font-size:16px;cursor:pointer;padding:4px 10px;border-radius:8px;font-family:var(--font);}
.month-label{font-size:13px;font-weight:700;min-width:80px;text-align:center;}

.budget-card{margin:0 16px 14px;background:var(--surface2);border-radius:20px;padding:18px 20px;border:0.5px solid rgba(167,139,250,0.2);}
.bcard-label{font-size:11px;font-weight:800;color:var(--subtle);text-transform:uppercase;margin-bottom:6px;}
.bcard-amount{font-size:38px;font-weight:900;color:#fff;line-height:1;margin-bottom:4px;}
.bcard-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:14px;}
.prog-track{background:rgba(255,255,255,0.1);border-radius:6px;height:6px;margin-bottom:8px;overflow:hidden;}
.prog-fill{height:100%;border-radius:6px;transition:width .6s;}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.35);}

.section{margin:0 16px 14px;}
.sec-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.txn-list{display:flex;flex-direction:column;background:var(--surface);border-radius:16px;overflow:hidden;border:0.5px solid var(--border);}
.txn-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .15s;}
.txn-item:last-child{border-bottom:none;}
.txn-item:active{background:var(--surface2);}
.txn-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.txn-info{flex:1;}
.txn-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.txn-detail{font-size:11px;color:var(--muted);margin-top:2px;}
.txn-amount{font-size:15px;font-weight:800;color:var(--red);flex-shrink:0;}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:44px;margin-bottom:12px;}

#fab{position:fixed;bottom:82px;right:calc(50% - 215px + 16px);width:56px;height:56px;border-radius:50%;background:var(--purple);border:none;color:#fff;font-size:30px;cursor:pointer;z-index:99;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 8px rgba(167,139,250,0.25),0 8px 24px rgba(167,139,250,0.35);font-family:var(--font);}
#fab:active{transform:scale(.9);}
@media(max-width:430px){#fab{right:16px;}}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:28px 28px 0 0;padding:20px 20px 36px;width:100%;max-width:430px;max-height:92dvh;overflow-y:auto;}
.modal::-webkit-scrollbar{display:none;}
.modal-handle{width:36px;height:4px;background:var(--surface3);border-radius:2px;margin:0 auto 18px;}
.modal-title{font-size:18px;font-weight:900;margin-bottom:20px;}
.amount-wrap{text-align:center;margin-bottom:22px;padding:16px;background:var(--surface2);border-radius:16px;}
.amount-inner{display:flex;align-items:baseline;justify-content:center;gap:6px;}
.amount-prefix{font-size:18px;color:var(--subtle);font-weight:600;}
#amount-input{background:none;border:none;border-bottom:2px solid var(--purple);font-family:var(--font);font-size:44px;font-weight:900;color:var(--text);width:200px;text-align:center;outline:none;padding-bottom:2px;}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.cat-btn{background:var(--surface2);border:1.5px solid transparent;border-radius:14px;padding:12px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all .15s;}
.cat-btn.selected{border-color:var(--purple);background:var(--purple-dim);}
.cat-e{font-size:24px;}
.cat-n{font-size:11px;color:var(--subtle);font-family:var(--font);font-weight:700;}
.input-group{margin-bottom:14px;}
.input-label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:block;}
.text-input{width:100%;background:var(--surface2);border:0.5px solid var(--border);border-radius:12px;padding:12px 14px;font-family:var(--font);font-size:14px;color:var(--text);outline:none;}
.text-input:focus{border-color:var(--purple);}
.save-btn{width:100%;background:var(--purple);border:none;border-radius:14px;padding:15px;font-family:var(--font);font-size:15px;font-weight:800;color:#fff;cursor:pointer;}
.save-btn:active{opacity:.85;}
.delete-btn{width:100%;background:rgba(248,113,113,0.12);border:0.5px solid rgba(248,113,113,0.25);border-radius:14px;padding:13px;font-family:var(--font);font-size:14px;font-weight:700;color:var(--red);cursor:pointer;margin-top:10px;}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat-card{background:var(--surface);border-radius:14px;padding:14px 12px;border:0.5px solid var(--border);}
.stat-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
.stat-value{font-size:18px;font-weight:900;}
.chart-card{background:var(--surface);border-radius:16px;padding:16px;border:0.5px solid var(--border);margin-bottom:14px;}
.chart-title{font-size:12px;font-weight:800;color:var(--subtle);text-transform:uppercase;margin-bottom:14px;}
.breakdown-list{display:flex;flex-direction:column;gap:12px;}
.breakdown-row{display:flex;align-items:center;gap:10px;}
.br-emoji{font-size:17px;width:24px;}
.br-info{flex:1;}
.br-top{font-size:13px;font-weight:700;display:flex;justify-content:space-between;margin-bottom:5px;}
.bar-track{background:var(--surface2);border-radius:4px;height:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .5s;}

.garden-scene{margin:0 16px 14px;border-radius:20px;overflow:hidden;border:0.5px solid rgba(52,211,153,0.15);}
.garden-sky-bg{height:80px;background:linear-gradient(180deg,#050d1f 0%,#0a1a35 70%,#0d2010 100%);}
.garden-ground-bg{background:linear-gradient(180deg,#1e4a0f 0%,#163508 100%);padding:16px 8px 20px;}
.plants-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.plant-pot-cell{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.plant-visual{position:relative;width:60px;height:70px;display:flex;align-items:flex-end;justify-content:center;font-size:40px;margin-bottom:3px;}
.pot-rim{width:28px;height:5px;background:#d97706;border-radius:3px;z-index:3;}
.pot-body{width:24px;height:12px;background:linear-gradient(180deg,#b45309,#92400e);border-radius:0 0 6px 6px;z-index:3;}
.plant-name-chip{font-size:9px;font-weight:800;color:rgba(255,255,255,0.8);background:rgba(0,0,0,0.4);border-radius:6px;padding:2px 6px;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
.plant-spent-lbl{font-size:9px;font-weight:700;color:var(--mint);text-align:center;margin-top:2px;}

.legend-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:0 16px 14px;}
.legend-card{background:var(--surface);border:0.5px solid var(--border);border-radius:14px;padding:12px;cursor:pointer;}
.legend-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.legend-emoji{font-size:20px;}
.legend-name{font-size:12px;font-weight:800;}
.legend-cat{font-size:10px;color:var(--muted);}
.legend-stage{font-size:10px;font-weight:700;margin-bottom:6px;}

.settings-card{background:var(--surface);border-radius:16px;border:0.5px solid var(--border);overflow:hidden;margin-bottom:14px;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:0.5px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-label{font-size:14px;font-weight:700;}
.settings-input{background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;padding:7px 10px;font-family:var(--font);font-size:14px;font-weight:700;color:var(--text);text-align:right;width:110px;}
.danger-btn{width:100%;background:rgba(248,113,113,0.1);border:0.5px solid rgba(248,113,113,0.2);border-radius:12px;padding:14px;font-family:var(--font);font-size:14px;font-weight:700;color:var(--red);cursor:pointer;margin-top:4px;}
#import-file{display:none;}

#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--surface2);border:0.5px solid var(--border2);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:700;color:var(--text);z-index:999;transition:transform .3s;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">🌳</div>
  <div class="login-title">省錢花園</div>
  <div class="login-sub">用 GitHub 登入<br>資料存在雲端</div>
  <div class="login-card">
    <button class="login-btn" onclick="loginWithGitHub()">🔐 用 GitHub 登入</button>
    <div class="login-msg" id="login-msg"></div>
    <div class="login-hint">第一次登入會自動建立帳號</div>
  </div>
</div>

<!-- APP -->
<div class="container">
<div id="app">
  <div class="screen active" id="screen-home">
    <div class="screen-header">
      <div class="screen-title">省錢花園</div>
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span class="month-label" id="home-month-label"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="budget-card">
      <div class="bcard-label">本月支出</div>
      <div class="bcard-amount" id="b-spent">NT$ 0</div>
      <div class="bcard-sub" id="b-sub"></div>
      <div class="prog-track"><div class="prog-fill" id="b-prog" style="width:0%;background:var(--mint)"></div></div>
      <div class="prog-labels"><span id="b-pct">0%</span><span id="b-days"></span></div>
    </div>
    <div class="section">
      <div class="sec-title">最近記錄</div>
      <div class="txn-list" id="txn-list"><div class="empty-state"><div class="empty-icon">🌸</div><p>還沒有記錄</p></div></div>
    </div>
  </div>

  <div class="screen" id="screen-analysis">
    <div class="screen-header">
      <div class="screen-title">分析 📊</div>
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span class="month-label" id="analysis-month-label"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div style="padding:0 16px 16px;">
      <div class="stat-row">
        <div class="stat-card"><div class="stat-label">總支出</div><div class="stat-value" style="color:var(--purple)" id="stat-total">0</div></div>
        <div class="stat-card"><div class="stat-label">筆數</div><div class="stat-value" style="color:var(--mint)" id="stat-count">0</div></div>
        <div class="stat-card"><div class="stat-label">日均</div><div class="stat-value" id="stat-avg">0</div></div>
      </div>
      <div class="chart-card"><div class="chart-title">類別分布</div><div style="position:relative;height:180px;"><canvas id="donut-chart"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">各類別詳細</div><div class="breakdown-list" id="cat-breakdown"></div></div>
      <div class="chart-card"><div class="chart-title">近6個月</div><div style="position:relative;height:150px;"><canvas id="trend-chart"></canvas></div></div>
    </div>
  </div>

  <div class="screen" id="screen-garden">
    <div class="screen-header"><div class="screen-title">花園 🌳</div></div>
    <div class="garden-scene">
      <div class="garden-sky-bg"></div>
      <div class="garden-ground-bg">
        <div class="plants-grid" id="plants-grid"></div>
      </div>
    </div>
    <div style="padding:0 16px;margin-bottom:10px;"><div class="sec-title">植物狀態</div></div>
    <div class="legend-grid" id="garden-legend"></div>
  </div>

  <div class="screen" id="screen-settings">
    <div class="screen-header"><div class="screen-title">設定 ⚙️</div></div>
    <div style="padding:0 16px 16px;">
      <div class="sec-title">預算</div>
      <div class="settings-card">
        <div class="settings-row">
          <div><div class="settings-label">💰 每月預算</div></div>
          <input type="number" class="settings-input" id="setting-total" placeholder="20000" oninput="saveAll()">
        </div>
      </div>
      <div class="sec-title">各類別</div>
      <div class="settings-card" id="cat-budget-list"></div>
      <div class="sec-title">資料</div>
      <div class="settings-card">
        <div class="settings-row" onclick="exportData()" style="cursor:pointer">
          <div><div class="settings-label">📥 匯出備份</div></div>
          <span style="color:var(--subtle)">›</span>
        </div>
        <div class="settings-row" onclick="document.getElementById('import-file').click()" style="cursor:pointer">
          <div><div class="settings-label">📤 匯入資料</div></div>
          <span style="color:var(--subtle)">›</span>
        </div>
        <div class="settings-row" onclick="doLogout()" style="cursor:pointer">
          <div><div class="settings-label">🚪 登出</div></div>
          <span style="color:var(--subtle)">›</span>
        </div>
      </div>
      <button class="danger-btn" onclick="resetData()">🗑️ 清除所有資料</button>
      <input type="file" id="import-file" accept=".json" onchange="importData(event)">
    </div>
  </div>

  <div id="nav">
    <button class="nav-item active" onclick="showScreen('home',this)"><span class="nav-icon">🏠</span><span>首頁</span></button>
    <button class="nav-item" onclick="showScreen('analysis',this)"><span class="nav-icon">📊</span><span>分析</span></button>
    <button class="nav-item" onclick="showScreen('garden',this)"><span class="nav-icon">🌳</span><span>花園</span></button>
    <button class="nav-item" onclick="showScreen('settings',this)"><span class="nav-icon">⚙️</span><span>設定</span></button>
  </div>
  <button id="fab" onclick="openModal()">+</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="overlayClose(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">新增記錄</div>
    <div class="amount-wrap"><div class="amount-inner"><span class="amount-prefix">NT$</span><input type="number" id="amount-input" placeholder="0"></div></div>
    <div class="input-group"><label class="input-label">類別</label><div class="cat-grid" id="cat-grid"></div></div>
    <div class="input-group"><label class="input-label">備註</label><input type="text" class="text-input" id="note-input" placeholder="例：家樂福"></div>
    <div class="input-group"><label class="input-label">日期</label><input type="date" class="text-input" id="date-input"></div>
    <button class="save-btn" id="save-btn" onclick="saveTxn()">✓ 儲存</button>
    <button class="delete-btn" id="delete-btn" style="display:none" onclick="deleteTxn()">刪除</button>
  </div>
</div>

</div>

<div id="toast"></div>

<script>
// Supabase 初始化
const SUPABASE_URL='https://pujiwylhqbrtwcbtyvee.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_xBLJG1_en-A_7KokEr5WAg_uX-Aq0lB';
var supabase=null;

var CATS=[
  {id:'food',name:'餐費',emoji:'🍜',color:'#f97316'},
  {id:'transit',name:'交通',emoji:'🚇',color:'#38bdf8'},
  {id:'shop',name:'購物',emoji:'🛒',color:'#ec4899'},
  {id:'fun',name:'娛樂',emoji:'🎮',color:'#8b5cf6'},
  {id:'health',name:'醫療',emoji:'💊',color:'#10b981'},
  {id:'other',name:'其他',emoji:'📦',color:'#94a3b8'}
];
var CAT_MAP={};for(var i=0;i<CATS.length;i++)CAT_MAP[CATS[i].id]=CATS[i];

var GROWTH=[
  {name:'種子',emoji:'🌰'},
  {name:'萌芽',emoji:'🌱'},
  {name:'幼苗',emoji:'🌱'},
  {name:'小株',emoji:'🌿'},
  {name:'初木',emoji:'🌿'},
  {name:'嫩樹',emoji:'🌳'},
  {name:'成樹',emoji:'🌳'},
  {name:'茂樹',emoji:'🌳'},
  {name:'壯木',emoji:'🌲'},
  {name:'大木',emoji:'🌲'},
  {name:'古樹',emoji:'🌲'},
  {name:'靈木',emoji:'🎋'},
  {name:'仙木',emoji:'🎋'},
  {name:'神木',emoji:'🌲'},
  {name:'傳說木',emoji:'🌲'},
  {name:'天地木',emoji:'🌲'},
  {name:'宇宙樹',emoji:'🌲'},
  {name:'混沌樹',emoji:'🌲'},
  {name:'永恆樹',emoji:'🌲'},
  {name:'創世樹',emoji:'🌲'}
];
var XP=[0,200,500,1000,2000,3500,5500,8000,11000,15000,20000,27000,35000,45000,58000,74000,93000,116000,143000,175000];

function getStage(total){var s=0;for(var i=GROWTH.length-1;i>=0;i--){if(total>=XP[i]){s=i;break;}}return s;}
function getXPInfo(total){var s=getStage(total);if(s>=GROWTH.length-1)return {pct:100,stage:s};var cur=XP[s],next=XP[s+1];return {pct:Math.round((total-cur)/(next-cur)*100),stage:s};}

var txns=[],settings={totalBudget:20000,catBudgets:{food:5000,transit:2000,shop:3000,fun:2000,health:2000,other:2000}};
var curUser=null,curMonth='',editId=null,donutChart=null,trendChart=null;

function fmt(n){return Math.round(n).toLocaleString('zh-TW');}
function fmtDate(ds){var d=new Date(ds+'T12:00:00'),n=new Date();var diff=Math.floor((n-d)/86400000);if(diff===0)return '今天';if(diff===1)return '昨天';return (d.getMonth()+1)+'/'+d.getDate();}
function fmtMonth(ym){var p=ym.split('-');return p[0]+'年'+Number(p[1])+'月';}
function getMonthYM(base,offset){var p=base.split('-');var d=new Date(Number(p[0]),Number(p[1])-1+offset,1);var m=d.getMonth()+1;return d.getFullYear()+'-'+(m<10?'0'+m:''+m);}
function monthTxns(ym){var r=[];for(var i=0;i<txns.length;i++){if(txns[i].date&&txns[i].date.indexOf(ym)===0)r.push(txns[i]);}return r;}
function monthSpent(ym){var mt=monthTxns(ym),s=0;for(var i=0;i<mt.length;i++)s+=Number(mt[i].amount);return s;}
function catSpent(ym,cid){var mt=monthTxns(ym),s=0;for(var i=0;i<mt.length;i++)if(mt[i].cat===cid)s+=Number(mt[i].amount);return s;}
function allTimeCatSpent(cid){var s=0;for(var i=0;i<txns.length;i++)if(txns[i].cat===cid)s+=Number(txns[i].amount);return s;}

// AUTH - GitHub OAuth
async function loginWithGitHub(){
  var msg=document.getElementById('login-msg');
  msg.textContent='重導向到 GitHub...';

  try{
    // 用 Supabase REST API 取得 GitHub OAuth URL
    var url=SUPABASE_URL+'/auth/v1/oauth2/authorize?provider=github&client_id='+SUPABASE_ANON_KEY+'&redirect_to='+encodeURIComponent(window.location.origin);

    // 改用簡單的方式：直接構建 OAuth URL
    var params=new URLSearchParams({
      provider:'github',
      redirect_to:window.location.origin,
      skip_browser_redirect:'false'
    });

    var oauthUrl=SUPABASE_URL+'/auth/v1/authorize?'+params.toString();
    console.log('Redirecting to:', oauthUrl);
    window.location.href=oauthUrl;
  }catch(err){
    console.error('OAuth error:', err);
    msg.textContent='❌ '+err.message;
  }
}

async function doLogout(){
  await supabase.auth.signOut();
  curUser=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').classList.remove('active');
  showToast('已登出');
}

async function loadUserData(){
  if(!curUser) return;
  try{
    const {data,error}=await supabase
      .from('user_settings')
      .select('*')
      .eq('user_id',curUser.id)
      .single();
    if(data){
      settings=data.cat_budgets?{totalBudget:data.total_budget||20000,catBudgets:data.cat_budgets}:{totalBudget:20000,catBudgets:{food:5000,transit:2000,shop:3000,fun:2000,health:2000,other:2000}};
    }

    const {data:txnData,error:txnErr}=await supabase
      .from('transactions')
      .select('*')
      .eq('user_id',curUser.id)
      .order('date',{ascending:false});
    if(txnData) txns=txnData;
  }catch(err){console.error(err);}
}

async function saveAll(){
  if(!curUser) return;
  try{
    await supabase
      .from('user_settings')
      .upsert({user_id:curUser.id,total_budget:settings.totalBudget,cat_budgets:settings.catBudgets,updated_at:new Date().toISOString()})
      .eq('user_id',curUser.id);

    for(var i=0;i<txns.length;i++){
      var t=txns[i];
      if(t.user_id===undefined) t.user_id=curUser.id;
    }
    await supabase
      .from('transactions')
      .upsert(txns.map(t=>({...t,user_id:curUser.id})));
  }catch(err){console.error(err);}
}

function showScreen(name,btn){
  var ss=document.querySelectorAll('.screen');for(var i=0;i<ss.length;i++)ss[i].classList.remove('active');
  document.getElementById('screen-'+name).classList.add('active');
  var ns=document.querySelectorAll('.nav-item');for(var j=0;j<ns.length;j++)ns[j].classList.remove('active');
  btn.classList.add('active');
  if(name==='home')renderHome();if(name==='analysis')renderAnalysis();if(name==='garden')renderGarden();if(name==='settings')renderSettings();
}
function changeMonth(dir){curMonth=getMonthYM(curMonth,dir);renderHome();renderAnalysis();}

function renderHome(){
  var ym=curMonth;
  document.getElementById('home-month-label').textContent=fmtMonth(ym);
  document.getElementById('analysis-month-label').textContent=fmtMonth(ym);
  var spent=monthSpent(ym),budget=settings.totalBudget,remain=budget-spent;
  var pct=budget>0?Math.min(100,Math.round(spent/budget*100)):0;
  var color=pct>=100?'var(--red)':pct>=80?'var(--amber)':'var(--mint)';
  document.getElementById('b-spent').textContent='NT$ '+fmt(spent);
  var rc=remain<0?'var(--red)':'var(--mint)';
  document.getElementById('b-sub').innerHTML='預算 NT$ '+fmt(budget)+' &middot; 剩餘 <strong style="color:'+rc+'">'+(remain<0?'-':'')+'NT$ '+fmt(Math.abs(remain))+'</strong>';
  var pr=document.getElementById('b-prog');pr.style.width=pct+'%';pr.style.background=color;
  document.getElementById('b-pct').textContent=pct+'%';
  var now=new Date(),yp=Number(ym.split('-')[0]),mp=Number(ym.split('-')[1]);
  document.getElementById('b-days').textContent=(now.getFullYear()===yp&&now.getMonth()+1===mp)?'還有 '+(new Date(yp,mp,0).getDate()-now.getDate())+' 天':'';
  var mt=monthTxns(ym);mt.sort(function(a,b){return a.date<b.date?1:-1;});
  var list=document.getElementById('txn-list');
  if(!mt.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">🌸</div><p>還沒有記錄</p></div>';return;}
  var html='';
  for(var i=0;i<Math.min(30,mt.length);i++){
    var t=mt[i],cat=CAT_MAP[t.cat]||CATS[5];
    html+='<div class="txn-item" onclick="openEditModal(\''+t.id+'\')">';
    html+='<div class="txn-icon" style="background:'+cat.color+'22">'+cat.emoji+'</div>';
    html+='<div class="txn-info"><div class="txn-name">'+(t.note||cat.name)+'</div>';
    html+='<div class="txn-detail">'+cat.name+' &middot; '+fmtDate(t.date)+'</div></div>';
    html+='<div class="txn-amount">-'+fmt(t.amount)+'</div></div>';
  }
  list.innerHTML=html;
}

function renderAnalysis(){
  var ym=curMonth,all=monthTxns(ym),total=0;
  for(var i=0;i<all.length;i++)total+=Number(all[i].amount);
  var yp=Number(ym.split('-')[0]),mp=Number(ym.split('-')[1]);
  var dim=new Date(yp,mp,0).getDate(),now=new Date();
  var dp=(now.getFullYear()===yp&&now.getMonth()+1===mp)?now.getDate():dim;
  document.getElementById('stat-total').textContent=fmt(total);
  document.getElementById('stat-count').textContent=all.length;
  document.getElementById('stat-avg').textContent=fmt(dp>0?total/dp:0);
  var catData=[];for(var ci=0;ci<CATS.length;ci++){var cs=catSpent(ym,CATS[ci].id);if(cs>0)catData.push({id:CATS[ci].id,name:CATS[ci].name,emoji:CATS[ci].emoji,color:CATS[ci].color,total:cs});}
  catData.sort(function(a,b){return b.total-a.total;});
  var bd=document.getElementById('cat-breakdown');
  if(!catData.length){bd.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted);">本月尚無記錄</div>';} else{var mx=catData[0].total,bhtml='';for(var di=0;di<catData.length;di++){var dc=catData[di],w=mx>0?Math.round(dc.total/mx*100):0;bhtml+='<div class="breakdown-row"><div class="br-emoji">'+dc.emoji+'</div><div class="br-info"><div class="br-top">'+dc.name+'<span style="color:var(--muted);font-weight:500;font-size:12px;">NT$ '+fmt(dc.total)+'</span></div><div class="bar-track"><div class="bar-fill" style="width:'+w+'%;background:'+dc.color+'"></div></div></div></div>';}bd.innerHTML=bhtml;}
  if(donutChart){donutChart.destroy();donutChart=null;}
  var dCtx=document.getElementById('donut-chart').getContext('2d');
  if(catData.length){var dl=[],dd=[],dc2=[];for(var dli=0;dli<catData.length;dli++){dl.push(catData[dli].name);dd.push(catData[dli].total);dc2.push(catData[dli].color);}donutChart=new Chart(dCtx,{type:'doughnut',data:{labels:dl,datasets:[{data:dd,backgroundColor:dc2,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'right',labels:{color:'#94a3b8',font:{family:'Nunito',size:11}}}}}});}
  if(trendChart){trendChart.destroy();trendChart=null;}
  var m6=[];for(var mi=0;mi<6;mi++)m6.push(getMonthYM(ym,mi-5));
  var tl=[],td=[],tc=[];for(var ti=0;ti<m6.length;ti++){tl.push(Number(m6[ti].split('-')[1])+'月');td.push(monthSpent(m6[ti]));tc.push(m6[ti]===ym?'rgba(167,139,250,0.85)':'rgba(167,139,250,0.2)');}
  var tCtx=document.getElementById('trend-chart').getContext('2d');
  trendChart=new Chart(tCtx,{type:'bar',data:{labels:tl,datasets:[{data:td,backgroundColor:tc,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#475569'}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#475569'}}}}});
}

function renderGarden(){
  var pg=document.getElementById('plants-grid'),lg=document.getElementById('garden-legend');
  var gHtml='',lHtml='';
  for(var ci=0;ci<CATS.length;ci++){
    var cat=CATS[ci],total=allTimeCatSpent(cat.id),xp=getXPInfo(total),stage=xp.stage,g=GROWTH[stage];
    gHtml+='<div class="plant-pot-cell"><div class="plant-visual">'+g.emoji+'</div><div class="pot-rim"></div><div class="pot-body"></div><div class="plant-name-chip">'+cat.name+'</div><div class="plant-spent-lbl">'+fmt(total)+'</div></div>';
    var nextInfo=stage<GROWTH.length-1?('還差 NT$ '+fmt(XP[stage+1]-total)):'滿級！';
    lHtml+='<div class="legend-card"><div class="legend-head"><div class="legend-emoji">'+cat.emoji+'</div><div><div class="legend-name">'+cat.name+'樹</div><div class="legend-cat">第'+(stage+1)+'/20 &middot; '+g.name+'</div></div></div><div style="font-size:10px;color:var(--subtle);">'+nextInfo+'</div></div>';
  }
  pg.innerHTML=gHtml;lg.innerHTML=lHtml;
}

function renderSettings(){
  document.getElementById('setting-total').value=settings.totalBudget||'';
  var html='';for(var i=0;i<CATS.length;i++){var c=CATS[i];html+='<div class="settings-row"><div><div class="settings-label">'+c.emoji+' '+c.name+'</div></div><input type="number" class="settings-input" data-cat="'+c.id+'" value="'+(settings.catBudgets[c.id]||'')+'" placeholder="0" oninput="saveBudget()"></div>';}
  document.getElementById('cat-budget-list').innerHTML=html;
}
function saveBudget(){
  settings.totalBudget=Number(document.getElementById('setting-total').value)||0;
  var inp=document.querySelectorAll('[data-cat]');for(var i=0;i<inp.length;i++)settings.catBudgets[inp[i].dataset.cat]=Number(inp[i].value)||0;
  saveAll();
  renderHome();
  showToast('✅ 預算已保存');
}

function buildCatGrid(sel){var html='';for(var i=0;i<CATS.length;i++){var c=CATS[i];html+='<button class="cat-btn'+(c.id===sel?' selected':'')+'" data-catid="'+c.id+'" onclick="selectCat(this)"><span class="cat-e">'+c.emoji+'</span><span class="cat-n">'+c.name+'</span></button>';}document.getElementById('cat-grid').innerHTML=html;}
function selectCat(btn){var bs=document.querySelectorAll('.cat-btn');for(var i=0;i<bs.length;i++)bs[i].classList.remove('selected');btn.classList.add('selected');}
function openModal(){
  editId=null;
  document.getElementById('modal-title').textContent='新增記錄';
  document.getElementById('amount-input').value='';document.getElementById('note-input').value='';
  document.getElementById('delete-btn').style.display='none';
  document.getElementById('date-input').value=new Date().toISOString().split('T')[0];
  buildCatGrid('food');document.getElementById('modal').classList.add('open');
  setTimeout(function(){document.getElementById('amount-input').focus();},300);
}
function openEditModal(id){
  var t=null;for(var i=0;i<txns.length;i++){if(txns[i].id===id){t=txns[i];break;}}if(!t)return;
  editId=id;
  document.getElementById('modal-title').textContent='編輯記錄';
  document.getElementById('amount-input').value=t.amount;document.getElementById('note-input').value=t.note||'';
  document.getElementById('date-input').value=t.date;document.getElementById('delete-btn').style.display='block';
  buildCatGrid(t.cat);document.getElementById('modal').classList.add('open');
}
function overlayClose(e){if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('open');}
async function saveTxn(){
  var amount=parseFloat(document.getElementById('amount-input').value);
  if(!amount||amount<=0){showToast('⚠️ 請輸入金額');return;}
  var selBtn=document.querySelector('.cat-btn.selected'),cat=selBtn?selBtn.dataset.catid:'other';
  var note=document.getElementById('note-input').value.trim();
  var date=document.getElementById('date-input').value||new Date().toISOString().split('T')[0];
  var nid=editId||(Date.now().toString(36)+Math.random().toString(36).slice(2));
  var record={id:nid,user_id:curUser.id,amount:amount,cat:cat,note:note,date:date};
  try{
    if(editId){
      await supabase.from('transactions').update(record).eq('id',editId);
    }else{
      await supabase.from('transactions').insert([record]);
    }
    await loadUserData();
    showToast(editId?'✅ 已更新':'✅ 已新增');
    document.getElementById('modal').classList.remove('open');
    renderHome();
  }catch(err){showToast('⚠️ 保存失敗');}
}

async function deleteTxn(){
  if(!editId||!confirm('確定刪除？'))return;
  try{
    await supabase.from('transactions').delete().eq('id',editId);
    await loadUserData();
    document.getElementById('modal').classList.remove('open');
    renderHome();
    showToast('🗑️ 已刪除');
  }catch(err){showToast('⚠️ 刪除失敗');}
}
function exportData(){
  var blob=new Blob([JSON.stringify({txns:txns,settings:settings},null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='garden-'+curUser+'-'+curMonth+'.json';a.click();showToast('📥 已下載');
}
function importData(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(!d.txns||!Array.isArray(d.txns))throw new Error('格式錯誤');
      var count=0;
      for(var i=0;i<d.txns.length;i++){
        var t=d.txns[i],exists=txns.some(x=>x.id===t.id);
        if(!exists){txns.push(t);count++;}
      }
      if(d.settings){if(d.settings.totalBudget)settings.totalBudget=d.settings.totalBudget;if(d.settings.catBudgets)for(var k in d.settings.catBudgets)settings.catBudgets[k]=d.settings.catBudgets[k];}
      saveAll();renderHome();renderSettings();showToast('✅ 匯入 '+count+' 筆');
    }catch(err){showToast('⚠️ 匯入失敗');}
    e.target.value='';
  };
  reader.readAsText(file);
}
function resetData(){
  if(!confirm('確定清除所有資料？'))return;
  txns=[];settings={totalBudget:20000,catBudgets:{food:5000,transit:2000,shop:3000,fun:2000,health:2000,other:2000}};
  saveAll();renderHome();showToast('🗑️ 已清除');
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2400);}

// 初始化
async function initApp(){
  var n=new Date(),m=n.getMonth()+1;
  curMonth=n.getFullYear()+'-'+(m<10?'0'+m:''+m);

  // 初始化 Supabase
  if(!supabase && window.supabase){
    const {createClient}=window.supabase;
    supabase=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  }

  if(!supabase){setTimeout(initApp,100);return;}

  try{
    // 檢查登入狀態
    const {data:{session}}=await supabase.auth.getSession();
    if(session && session.user){
      curUser=session.user;
      await loadUserData();
      document.getElementById('login-screen').style.display='none';
      document.getElementById('app').classList.add('active');
      showToast('歡迎回來 🌱');
    }else{
      document.getElementById('login-hint').textContent='第一次登入會建立帳號';
    }

    // 監聽登入狀態
    supabase.auth.onAuthStateChange(async (event,session)=>{
      if(event==='SIGNED_IN' && session.user){
        curUser=session.user;
        await loadUserData();
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app').classList.add('active');
        showToast('✅ 登入成功！');
      }else if(event==='SIGNED_OUT'){
        curUser=null;
        document.getElementById('login-screen').style.display='flex';
        document.getElementById('app').classList.remove('active');
      }
    });
  }catch(err){console.error('Init error:',err);}
}

document.addEventListener('DOMContentLoaded',async function(){
  var n=new Date(),m=n.getMonth()+1;
  curMonth=n.getFullYear()+'-'+(m<10?'0'+m:''+m);

  // 檢查 URL 中的 token（GitHub OAuth 回調）
  var hash=window.location.hash;
  if(hash.includes('access_token')){
    console.log('OAuth callback detected');
    var params=new URLSearchParams(hash.substring(1));
    var token=params.get('access_token');
    if(token){
      localStorage.setItem('sb_token',token);
      // 清除 hash
      window.history.replaceState({}, document.title, window.location.pathname);
      // 取得用戶信息
      try{
        var userRes=await fetch(SUPABASE_URL+'/auth/v1/user',{
          headers:{'Authorization':'Bearer '+token,'apikey':SUPABASE_ANON_KEY}
        });
        var user=await userRes.json();
        if(userRes.ok){
          curUser=user;
          document.getElementById('login-screen').style.display='none';
          document.getElementById('app').classList.add('active');
          renderHome();
          return;
        }
      }catch(err){console.error(err);}
    }
  }

  // 檢查本地 token
  var token=localStorage.getItem('sb_token');
  if(token){
    try{
      var res=await fetch(SUPABASE_URL+'/auth/v1/user',{
        headers:{'Authorization':'Bearer '+token,'apikey':SUPABASE_ANON_KEY}
      });
      if(res.ok){
        var user=await res.json();
        curUser=user;
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app').classList.add('active');
        renderHome();
        return;
      }
    }catch(err){console.error(err);}
  }

  // 沒有認證，顯示登入畫面
  console.log('No valid session, showing login');
});
</script>
